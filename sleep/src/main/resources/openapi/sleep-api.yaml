openapi: 3.0.3
info:
  title: Sleep API
  description: REST API for logging and retrieving sleep data.
  version: 0.0.1-SNAPSHOT

servers:
  - url: http://localhost:8080
    description: Local development server

paths:
  /api/v1/sleep-log:
    post:
      operationId: createSleepLog
      summary: Create today's sleep log
      description: >
        Records details about the user's sleep. Note that this endpoint only allows sleep to be recorded for the
        current day in the user's default time zone. This endpoint does not accept a time zone override at this
        time, nor different time zones for bed and wake times. Any offset provided in the bed and wake time fields
        are not used for any time calculations. Times are simply converted to UTC and associated with the
        user's current default time zone when saved.
      tags:
        - sleep
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSleepLogRequest'
      responses:
        '201':
          description: Sleep log created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SleepLogResponse'
        '400':
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: A sleep log already exists for this user and time range.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      operationId: getSleepLog
      summary: Get today's sleep log
      description: >
        Returns details about the user's sleep. Note that this endpoint only allows retrieval of sleep logs for the
        current day in the user's default time zone. This endpoint does not accept a time zone override at this
        time.
      tags:
        - sleep
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
      responses:
        '200':
          description: Sleep log found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SleepLogResponse'
        '404':
          description: No sleep log found for today.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/sleep-stats:
    get:
      operationId: getSleepStats
      summary: Get sleep statistics
      description: >
        Returns aggregated sleep statistics over the last 30 days (today and the 29 days before it) for the user.
        The average bed and wake times are derived by calculating the circular mean of each local times in the
        specified period. The final average bed and wake times are displayed only as local times with no time
        zone tag since aggregated results may have come from different time zones. Note that the circular
        mean calculation assumes that the user sleeps a typical overnight schedule and may not be accurate for users
        who sleep during the day. The average sleep duration will be accurate regardless of the user's sleep schedule.
      tags:
        - sleep
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
      responses:
        '200':
          description: Statistics computed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SleepStatsResponse'

components:
  parameters:
    UserIdHeader:
      name: X-User-Id
      in: header
      required: true
      description: Identifies the user making the request.
      schema:
        type: integer
        format: int64
        minimum: 1

  schemas:
    CreateSleepLogRequest:
      type: object
      required:
        - bedTime
        - wakeTime
        - mood
      properties:
        bedTime:
          type: string
          format: date-time
          description: The date-time the user went to bed.
          example: "2024-01-14T22:30:00Z"
        wakeTime:
          type: string
          format: date-time
          description: The date-time the user woke up.
          example: "2024-01-15T06:45:00Z"
        mood:
          $ref: '#/components/schemas/Mood'

    SleepLogResponse:
      type: object
      required:
        - bedTime
        - bedTimeZone
        - wakeTime
        - wakeTimeZone
        - durationMinutes
        - mood
      properties:
        bedTime:
          type: string
          format: date-time
          description: The date-time the user went to bed.
          example: "2024-01-14T22:30:00Z"
        bedTimeZone:
          type: string
          description: The time zone of the bed time.
          example: "America/New_York"
        wakeTime:
          type: string
          format: date-time
          description: The date-time the user woke up.
          example: "2024-01-15T06:45:00Z"
        wakeTimeZone:
          type: string
          description: The time zone of the wake time.
          example: "America/New_York"
        durationMinutes:
          type: integer
          format: int64
          description: Total time in bed in minutes.
          example: 495
        mood:
          $ref: '#/components/schemas/Mood'

    SleepStatsResponse:
      type: object
      required:
        - dateFrom
        - dateTo
        - moodFrequencies
      properties:
        dateFrom:
          type: string
          format: date-time
          description: Start of the averaging period (inclusive).
          example: "2023-12-17T00:00:00Z"
        dateTo:
          type: string
          format: date-time
          description: End of the averaging period (exclusive).
          example: "2024-01-15T00:00:00Z"
        averageDurationMinutes:
          type: integer
          format: int64
          nullable: true
          description: Average total time in bed in minutes. Null when no logs exist in the period.
          example: 465
        averageBedTime:
          type: string
          format: time
          nullable: true
          description: Average local time the user goes to bed. Null when no logs exist in the period.
          example: "23:00:00"
        averageWakeTime:
          type: string
          format: time
          nullable: true
          description: Average local time the user wakes up. Null when no logs exist in the period.
          example: "06:45:00"
        moodFrequencies:
          $ref: '#/components/schemas/MoodFrequencies'

    MoodFrequencies:
      type: object
      required:
        - badFrequency
        - okFrequency
        - goodFrequency
      properties:
        badFrequency:
          type: integer
          description: Count of BAD mood entries.
          example: 5
        okFrequency:
          type: integer
          description: Count of OK mood entries.
          example: 12
        goodFrequency:
          type: integer
          description: Count of GOOD mood entries.
          example: 13

    Mood:
      type: string
      enum:
        - BAD
        - OK
        - GOOD
      description: How the user felt in the morning.

    ErrorResponse:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
          description: Error type.
          example: "Not Found"
        message:
          type: string
          description: Detailed error message.
          example: "No sleep log found for today."
