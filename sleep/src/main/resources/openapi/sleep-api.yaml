openapi: 3.0.3
info:
  title: Sleep API
  description: REST API for logging and retrieving sleep data.
  version: 0.0.1-SNAPSHOT

servers:
  - url: http://localhost:8080
    description: Local development server

paths:
  /test:
    get:
      operationId: test
      summary: A test endpoint.
      description: Returns a test response.
      tags:
        - test
      responses:
        '200':
          description: Test response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestResponse'
components:
  schemas:
    TestResponse:
      type: object
      required:
        - testMessage
      properties:
        testMessage:
          type: string
          description: A test message.
          example: Hello world!